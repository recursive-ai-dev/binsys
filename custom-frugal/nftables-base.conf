# /etc/frugalos/nftables-base.conf
# FrugalOS Default Network Policy
#
# Loaded by:  the network plugin's on_load hook
#             OR manually: nft -f /etc/frugalos/nftables-base.conf
#
# Philosophy:
#   Default posture is DENY. Every allowed flow must be explicitly listed.
#   This file defines what a "network-capable" FrugalOS system allows
#   BEFORE any application plugin adds its own rules.
#
#   Plugins that need network access add their rules to the frugalos_app
#   chain via their on_load hook (see examples at bottom).
#   When the plugin unloads, its on_unload hook removes those rules.
#
# Table hierarchy (lower priority number = runs FIRST):
#   priority -200  →  netlock  (emergency isolation, highest authority)
#   priority   0   →  frugalos (this file, base policy)
#   priority 100   →  plugin rules (added by application plugins)
#
# If netlock is engaged, its table at priority -200 overrides this entirely.
# ──────────────────────────────────────────────────────────────────────────

flush ruleset

# ── Base policy table ──────────────────────────────────────────────────────

table inet frugalos {

    # ── Named sets (populated at runtime) ──────────────────────────────────

    # Interfaces allowed to carry traffic (populated by network plugin)
    set trusted_ifaces {
        type ifname
        flags dynamic,timeout
    }

    # IPv4 ranges explicitly blocked regardless of other rules
    # (RFC1918 ranges are NOT here by default — LAN access is a policy choice)
    set blocklist_v4 {
        type ipv4_addr
        flags interval
        # Add known-bad ranges here, e.g.:
        # elements = { 0.0.0.0/8, 100.64.0.0/10 }
    }

    # Ports this host explicitly listens on (populated by service plugins)
    set allowed_local_ports_tcp {
        type inet_service
        flags dynamic
    }

    set allowed_local_ports_udp {
        type inet_service
        flags dynamic
    }

    # ── INPUT chain ────────────────────────────────────────────────────────

    chain input {
        type filter hook input priority filter; policy drop;

        # Loopback — unconditional. Removing this breaks IPC, DBus,
        # X11 sockets, and nearly all inter-process communication.
        iif lo accept comment "loopback unrestricted"

        # Drop invalid packets immediately — prevents state table abuse
        ct state invalid drop comment "drop invalid conntrack"

        # Established and related — accept ongoing sessions
        ct state { established, related } accept comment "established sessions"

        # Blocklist — drop early, before any other evaluation
        ip saddr @blocklist_v4 drop comment "explicit blocklist"

        # ICMP — restricted to prevent amplification and scanning
        ip  protocol icmp      icmp  type {
            echo-reply,
            destination-unreachable,
            time-exceeded,
            parameter-problem
        } accept comment "safe ICMP types only"

        ip6 nexthdr icmpv6     icmpv6 type {
            echo-reply,
            destination-unreachable,
            packet-too-big,
            time-exceeded,
            parameter-problem,
            nd-neighbor-solicit,
            nd-neighbor-advert
        } accept comment "safe ICMPv6 types only"

        # Accept pings from trusted interfaces only
        iif @trusted_ifaces ip  protocol icmp  icmp  type echo-request accept
        iif @trusted_ifaces ip6 nexthdr  icmpv6 icmpv6 type echo-request accept

        # Services explicitly opened by plugins
        tcp dport @allowed_local_ports_tcp \
            iif @trusted_ifaces accept comment "plugin-opened TCP ports"
        udp dport @allowed_local_ports_udp \
            iif @trusted_ifaces accept comment "plugin-opened UDP ports"

        # Log and drop everything else
        log prefix "frugalos DROP IN: " level warn
        drop
    }

    # ── OUTPUT chain ───────────────────────────────────────────────────────

    chain output {
        type filter hook output priority filter; policy drop;

        # Loopback — unrestricted
        oif lo accept

        # Drop invalid
        ct state invalid drop

        # Established/related
        ct state { established, related } accept

        # Blocklist — don't send to blocked destinations
        ip daddr @blocklist_v4 drop

        # Allow outbound on trusted interfaces
        # Plugins register their interface in trusted_ifaces when they load.
        oif @trusted_ifaces accept comment "trusted interface outbound"

        log prefix "frugalos DROP OUT: " level warn
        drop
    }

    # ── FORWARD chain ──────────────────────────────────────────────────────

    chain forward {
        type filter hook forward priority filter; policy drop;

        # FrugalOS is not a router by default.
        # A routing/NAT plugin would add rules here.
        ct state { established, related } accept
        log prefix "frugalos DROP FWD: " level warn
        drop
    }

    # ── Application hook chain ─────────────────────────────────────────────
    # Plugins add their rules here (jump from input/output chains).
    # Using a separate chain means plugin rules are isolated and auditable.
    # Priority 100 (below base policy at 0) means base rules run first.

    chain app_input {
        type filter hook input priority 100; policy accept;
        # Plugins prepend/append rules here via on_load hooks
        # Example from an SSH plugin on_load:
        #   nft add rule inet frugalos app_input tcp dport 22 accept
    }

    chain app_output {
        type filter hook output priority 100; policy accept;
        # Example from a DNS plugin on_load:
        #   nft add rule inet frugalos app_output udp dport 53 accept
    }
}


# ════════════════════════════════════════════════════════════════════════════
# PLUGIN INTEGRATION EXAMPLES (do not uncomment here — these go in hooks)
# ════════════════════════════════════════════════════════════════════════════

# ── network plugin on_load (brings up eth0) ───────────────────────────────
#
#   #!/bin/sh
#   IFACE="eth0"
#   ip link set "$IFACE" up
#   udhcpc -i "$IFACE" -q
#   nft add element inet frugalos trusted_ifaces { "$IFACE" }
#
# ── network plugin on_unload ──────────────────────────────────────────────
#
#   #!/bin/sh
#   IFACE="eth0"
#   nft delete element inet frugalos trusted_ifaces { "$IFACE" } 2>/dev/null || true
#   ip link set "$IFACE" down
#
# ── ssh-server plugin on_load ─────────────────────────────────────────────
#
#   #!/bin/sh
#   nft add rule inet frugalos app_input \
#       tcp dport 22 ct state new accept comment "ssh-server plugin"
#   /usr/sbin/sshd
#
# ── ssh-server plugin on_unload ───────────────────────────────────────────
#
#   #!/bin/sh
#   # Remove by handle — get handle first:
#   #   nft -a list chain inet frugalos app_input
#   HANDLE=$(nft -a list chain inet frugalos app_input 2>/dev/null \
#            | grep "ssh-server plugin" | awk '{print $NF}')
#   [ -n "$HANDLE" ] && nft delete rule inet frugalos app_input handle "$HANDLE"
#   pkill -x sshd || true
#
# ════════════════════════════════════════════════════════════════════════════
